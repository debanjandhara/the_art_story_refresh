<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheArtStory - Refresh Page</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.1.3/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #responseBox {
            height: 70vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="flex flex-col jusitfy-center items-center space-y-5 py-5">
        <div class='text-3xl font-semibold font-sans'>TheArtStory - Refresh Page</div>
        <button type="button" class="bg-blue-500 hover:bg-blue-700 text-white focus:ring-2 focus:ring-blue-400 font-bold py-2 px-4 rounded" onclick="triggerFunction()">Trigger Function</button>
    </div>
    <div id="responseBox" class=" mx-5 px-6">
    </div>

    <script>
        // Connect to the Socket.IO server
        // var socket = io.connect('https://' + document.domain + ':' + location.port);
        // var socket = io.connect('https://dev.aibe.theartstory.org/dd-refresh/');
        var socket = io.connect('https://71cd-14-194-176-244.ngrok-free.app/', {
            'path': '/dd-refresh/socket.io'
        });


        // Function to trigger the backend function
        function triggerFunction() {
            socket.emit('trigger_function');
        }

        var responseBox = document.getElementById('responseBox');
        var scrollingDown = true;

        // Function to update the response box with the output
        socket.on('update_response', function(output) {
            // Create a new paragraph element
            var newParagraph = document.createElement('p');
            
            // Set the content of the new paragraph
            newParagraph.innerHTML = output;
            // newParagraph.classList.add("w-full text-lg py-2 px-6 my-3");
            newParagraph.classList.add('w-full', 'text-lg', 'text-center', 'py-1', 'px-6', 'my-1');

            // Append the new paragraph to the response box
            responseBox.appendChild(newParagraph);

            // If scrolling down, auto-scroll to the bottom
            if (scrollingDown) {
                responseBox.scrollTop = responseBox.scrollHeight;
            }
        });

        // Event listener for scroll events
        responseBox.addEventListener('scroll', function() {
            // Check if the user is scrolling down
            scrollingDown = responseBox.scrollTop + responseBox.clientHeight >= responseBox.scrollHeight;
        });
    </script>
</body>
</html>
